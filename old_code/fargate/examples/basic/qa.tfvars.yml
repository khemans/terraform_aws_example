#### Fargate Resources ####
fargate_cpu: 512
fargate_memory: 1024
desired_count: 2

#### Health Check ####
health_check_path: "/"

#### Logging ####
log_retention_days: 30

#### Auto Scaling ####
enable_autoscaling: true
min_capacity: 2
max_capacity: 10

#### Container Environment Variables ####
container_environment: []
# Example:
# container_environment:
#   - name: "NODE_ENV"
#     value: "qa"
#   - name: "API_URL"
#     value: "https://api-qa.example.com"

#### Remote State ####
kubernetes_remote_state_bucket: ""
kubernetes_remote_state_workspace: nonprod

#### Tags ####
tags:
  product: 
  service: my-app
  repo: company/my-repo
  project: my-project
  resource: fargate
  env: qa
  terraform: true
  cc: 0
  core-aws: false
  global: false
  us: true
  canada: false
  luxury: false

