#### Required Variables ####
project_name: my-app
environment: qa
vpc_name: my-vpc-qa

#### AWS Configuration ####
region: us-east-1
aws_region: us-east-1
availability_zones: ["a", "b", "c"]

#### Container Configuration ####
container_port: 80
container_tag: latest

